<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create New User Modal</title>
    <style>
      :root {
        --bg: #f2f6f7;
        --surface: #ffffff;
        --ink: #132330;
        --muted: #5d6e7a;
        --line: #d7e0e5;
        --brand: #0d6b6b;
        --brand-soft: #e3f5f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at 20% 10%, #dff3f3, transparent 40%),
          radial-gradient(circle at 90% 80%, #e9eefc, transparent 35%), var(--bg);
        color: var(--ink);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .modal {
        width: min(960px, 100%);
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(19, 35, 48, 0.12);
        padding: 20px;
      }

      .heading {
        margin: 0;
        font-size: 1.5rem;
      }

      .sub {
        margin: 6px 0 18px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 16px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      label {
        font-size: 0.9rem;
        font-weight: 600;
      }

      input,
      select {
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 10px;
        font-size: 0.95rem;
      }

      .matrix-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 10px 0;
      }

      .matrix-title {
        margin: 0;
        font-size: 1rem;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 8px;
        height: 34px;
        padding: 0 12px;
        font-weight: 600;
        cursor: pointer;
        background: #fff;
      }

      .primary {
        background: var(--brand);
        color: #fff;
        border-color: var(--brand);
      }

      .table-wrap {
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: auto;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        min-width: 700px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 10px;
        text-align: left;
      }

      thead th {
        background: var(--brand-soft);
        font-size: 0.8rem;
        letter-spacing: 0.04em;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      .footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 16px;
      }

      @media (max-width: 720px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .matrix-top {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <section class="modal" aria-labelledby="create-user-title">
      <h1 id="create-user-title" class="heading">Create New User</h1>
      <p class="sub">Configure identity details and resource-level CRUD permissions.</p>

      <form id="createUserForm">
        <div class="grid">
          <div class="field">
            <label for="fullName">Full Name</label>
            <input id="fullName" name="fullName" type="text" required />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" minlength="6" required />
          </div>
          <div class="field">
            <label for="unit">Manufacturing Unit</label>
            <select id="unit" name="unit" required>
              <option value="">Select Unit</option>
              <option value="1">Unit Alpha</option>
              <option value="2">Unit Beta</option>
              <option value="3">Unit Gamma</option>
            </select>
          </div>
        </div>

        <div class="matrix-top">
          <h2 class="matrix-title">Permissions Matrix</h2>
          <div class="actions">
            <button type="button" id="selectAllBtn">Select All</button>
            <button type="button" id="clearAllBtn">Clear All</button>
          </div>
        </div>

        <div class="table-wrap">
          <table aria-label="Permissions matrix">
            <thead>
              <tr>
                <th>Resource</th>
                <th>Create</th>
                <th>Read</th>
                <th>Update</th>
                <th>Delete</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Product</td>
                <td><input type="checkbox" class="perm" data-resource="product" data-op="create" /></td>
                <td><input type="checkbox" class="perm" data-resource="product" data-op="read" /></td>
                <td><input type="checkbox" class="perm" data-resource="product" data-op="update" /></td>
                <td><input type="checkbox" class="perm" data-resource="product" data-op="delete" /></td>
              </tr>
              <tr>
                <td>Fracticl</td>
                <td><input type="checkbox" class="perm" data-resource="fracticl" data-op="create" /></td>
                <td><input type="checkbox" class="perm" data-resource="fracticl" data-op="read" /></td>
                <td><input type="checkbox" class="perm" data-resource="fracticl" data-op="update" /></td>
                <td><input type="checkbox" class="perm" data-resource="fracticl" data-op="delete" /></td>
              </tr>
              <tr>
                <td>Tier</td>
                <td><input type="checkbox" class="perm" data-resource="tier" data-op="create" /></td>
                <td><input type="checkbox" class="perm" data-resource="tier" data-op="read" /></td>
                <td><input type="checkbox" class="perm" data-resource="tier" data-op="update" /></td>
                <td><input type="checkbox" class="perm" data-resource="tier" data-op="delete" /></td>
              </tr>
              <tr>
                <td>Cells</td>
                <td><input type="checkbox" class="perm" data-resource="cells" data-op="create" /></td>
                <td><input type="checkbox" class="perm" data-resource="cells" data-op="read" /></td>
                <td><input type="checkbox" class="perm" data-resource="cells" data-op="update" /></td>
                <td><input type="checkbox" class="perm" data-resource="cells" data-op="delete" /></td>
              </tr>
              <tr>
                <td>Batch</td>
                <td><input type="checkbox" class="perm" data-resource="batch" data-op="create" /></td>
                <td><input type="checkbox" class="perm" data-resource="batch" data-op="read" /></td>
                <td><input type="checkbox" class="perm" data-resource="batch" data-op="update" /></td>
                <td><input type="checkbox" class="perm" data-resource="batch" data-op="delete" /></td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="footer">
          <button type="reset">Cancel</button>
          <button type="submit" class="primary">Create User</button>
        </div>
      </form>
    </section>

    <script>
      const checkboxes = Array.from(document.querySelectorAll(".perm"));
      const selectAllBtn = document.getElementById("selectAllBtn");
      const clearAllBtn = document.getElementById("clearAllBtn");
      const createUserForm = document.getElementById("createUserForm");

      selectAllBtn.addEventListener("click", () => {
        checkboxes.forEach((checkbox) => {
          checkbox.checked = true;
        });
      });

      clearAllBtn.addEventListener("click", () => {
        checkboxes.forEach((checkbox) => {
          checkbox.checked = false;
        });
      });

      createUserForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const matrix = {};
        checkboxes.forEach((checkbox) => {
          const resource = checkbox.dataset.resource;
          const operation = checkbox.dataset.op;

          if (!matrix[resource]) {
            matrix[resource] = {};
          }

          matrix[resource][operation] = checkbox.checked;
        });

        const payload = {
          name: document.getElementById("fullName").value,
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
          unit_id: document.getElementById("unit").value,
          permissions: matrix,
        };

        console.log("Create user payload:", payload);
        alert("Form captured. Open console to inspect payload.");
      });
    </script>
  </body>
</html>
